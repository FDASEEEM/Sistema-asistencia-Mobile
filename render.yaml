services:
  - type: web
    name: sistema-cesar-mobile-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APODERADOS_PG_SCHEMA
        value: test_pruebas
      - key: MOBILE_RUN_MIGRATIONS
        value: "true"
      - key: PG_SSL
        value: "true"
      - key: CORS_ORIGINS
        value: ""
